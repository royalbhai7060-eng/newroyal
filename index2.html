/* STAR BACKGROUND */

.stars{

h1{
color:#ffd500;
margin-top:20px;
font-size:28px;
}

.text{
color:#ddd;
margin-top:10px;
font-size:16px;
}

.btn{
display:block;
margin:20px auto;
padding:15px;
width:80%;

font-size:18px;
font-weight:bold;
text-decoration:none;
color:white;
background:linear-gradient(45deg,#ff9500,#ff3c00);
box-shadow:0 0 20px orange;

.timer{

<script>

/* STAR GENERATOR */

for(let i=0;i<120;i++){
